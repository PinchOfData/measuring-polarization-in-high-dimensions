name: gst
channels:
  - conda-forge
dependencies:
  - python=3.11
  - pip
  - pip:
    # Torch wheel built against CUDA 12.8 (matches driver version on this host).
    # Switch the --index-url to cpu / cu121 / etc. for other setups.
    - --extra-index-url https://download.pytorch.org/whl/cu128
    - torch>=2.2
    - numpy>=1.24
    - scipy>=1.11
    - scikit-learn>=1.3
    - patsy>=0.5
    - joblib>=1.3
    - pandas>=2.0
    - matplotlib>=3.7
    - pytest>=7.4
    - pytest-xdist>=3.3
    - jupyterlab>=4.0
    - tqdm>=4.66
